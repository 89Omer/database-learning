<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySQL Masterclass — Interactive Tutorial</title>
  <meta name="description" content="Learn MySQL from scratch with interactive lessons and a live SQL editor. Phase 1: MySQL + PHP, Node.js, Python.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Prism Syntax Highlighting (for code lessons) -->
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Initialising MySQL engine…</div>
</div>

<!-- App Shell -->
<div id="app">

  <!-- Header -->
  <header id="header">
    <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
    <a href="#" class="header-logo">
      <span class="logo-db">🗄️</span>
      <span>MySQL<span class="logo-name">Masterclass</span></span>
    </a>
    <div class="header-divider"></div>
    <span class="header-badge">Phase 1</span>
    <span class="header-phase">MySQL · PHP · Node.js · Python</span>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="progress-section">
      <div class="progress-label">
        <span>Your Progress</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>
    <nav id="lesson-nav" aria-label="Lessons"></nav>
  </aside>

  <!-- Main Content -->
  <main id="main">
    <!-- Left: Theory Panel -->
    <section id="theory-panel">
      <h1 id="lesson-title">Loading…</h1>
      <div id="lesson-content"></div>
    </section>

    <!-- Right: Interactive Panel (SQL editor or code viewer) -->
    <section id="right-panel"></section>
  </main>

</div>

<!-- sql.js — in-browser SQLite engine (MySQL-compatible syntax for learning) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>

<!-- Prism syntax highlighting -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<!-- App Scripts -->
<script src="js/sql-engine.js"></script>
<script src="js/lessons.js"></script>
<script src="js/app.js"></script>
</body>
</html>
